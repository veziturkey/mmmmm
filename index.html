<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع مغلق مؤقتاً</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }
        
        h1 {
            color: #2d3748;
            font-size: 36px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .message {
            color: #4a5568;
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 0 20px;
        }
        
        .contact-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
        }
        
        .contact-label {
            color: #4a5568;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .phone-number {
            color: #2d3748;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 10px 0;
            direction: ltr;
        }
        
        .phone-number a {
            color: #2d3748;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .phone-number a:hover {
            color: #667eea;
        }
        
        .warning-box {
            background: #fff3cd;
            border: 2px solid #ff6b6b;
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
        }
        
        .warning-text {
            color: #856404;
            font-size: 18px;
            font-weight: 600;
        }
        
        .warning-text i {
            font-style: normal;
            color: #dc3545;
            font-size: 24px;
            display: block;
            margin-bottom: 10px;
        }
        
        .footer {
            margin-top: 30px;
            color: #718096;
            font-size: 14px;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .message {
                font-size: 18px;
            }
            
            .phone-number {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔒</div>
        
        <h1>الموقع مغلق مؤقتاً</h1>
        
        <div class="message">
            نأسف للإزعاج، تم إغلاق الموقع بسبب عدم تسديد أجور العمل وأجور استضافة السيرفر
        </div>
        
        <div class="contact-box">
            <div class="contact-label">📞 للتواصل والاستفسار</div>
            <div class="phone-number">
                <a href="tel:07821531234">07821531234</a>
            </div>
            <div style="color: #718096; margin-top: 10px; font-size: 16px;">
                اضغط على الرقم للاتصال المباشر
            </div>
        </div>
        
        <div class="warning-box">
            <div class="warning-text">
                <i>⚠️</i>
                سيتم إعادة تشغيل الموقع فور تسديد المستحقات
            </div>
        </div>
        
        <div class="footer">
            نشكر تفهمكم ونعتذر عن أي إزعاج
        </div>
    </div>
</body>
</html>
